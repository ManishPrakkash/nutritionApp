name: health_nutrition_app
description: AI-powered Health & Nutrition Advisor - Know Your Body. Own Your Health.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  # State & Network
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.7.0
  # Health & Device (^13.x for Android Kotlin / Flutter embedding compatibility)
  health: ^13.0.0
  permission_handler: ^11.3.1
  # Utils
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.5.1
  pdf: ^3.11.1
  path_provider: ^2.1.4
  open_file: ^3.5.7
  pedometer: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.jpeg"
